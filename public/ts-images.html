<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#111;--card:#1a1a1a;--border:rgba(255,255,255,.08);--text:#eee;--muted:rgba(255,255,255,.45);--accent:#c4a87c;--accent-dim:rgba(196,168,124,.15);--green:#4CAF50;--red:#E53935}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}
a{color:var(--accent);text-decoration:none}

/* Login */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:48px 40px;width:400px;max-width:100%;text-align:center}
.login-box h1{font-size:28px;font-weight:800;letter-spacing:-1px;margin-bottom:8px}
.login-box p{color:var(--muted);font-size:13px;margin-bottom:32px}
.login-box input{width:100%;padding:14px 18px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:10px;color:#fff;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
.login-box input:focus{border-color:var(--accent)}
.login-box button{width:100%;padding:14px;margin-top:16px;background:var(--accent);color:#111;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border:none;border-radius:10px;cursor:pointer;transition:opacity .2s}
.login-box button:hover{opacity:.85}
.login-error{color:var(--red);font-size:12px;margin-top:12px;display:none}

/* Main Layout */
#app{display:none}
.topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:16px;padding:16px 32px;background:rgba(17,17,17,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.topbar h1{font-size:18px;font-weight:800;letter-spacing:-.5px;flex:1}
.topbar .btn-back{font-size:12px;color:var(--muted);border:1px solid var(--border);padding:8px 16px;border-radius:8px;cursor:pointer;background:none;font-family:inherit;transition:all .2s}
.topbar .btn-back:hover{color:#fff;border-color:rgba(255,255,255,.3)}

/* Tabs */
.tabs{display:flex;gap:4px;padding:16px 32px 0;flex-wrap:wrap}
.tab{padding:10px 20px;font-size:12px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);background:none;border:1px solid transparent;border-radius:8px 8px 0 0;cursor:pointer;font-family:inherit;transition:all .2s}
.tab:hover{color:#fff;background:rgba(255,255,255,.04)}
.tab.active{color:var(--accent);border-color:var(--border);border-bottom-color:var(--bg);background:var(--bg)}

/* Grid */
.grid-wrap{padding:0 32px 48px}
.section-label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:24px 0 12px;border-bottom:1px solid var(--border);margin-bottom:16px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;margin-bottom:32px}

/* Card */
.img-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .25s;position:relative}
.img-card:hover{border-color:rgba(196,168,124,.4);transform:translateY(-2px)}
.img-card .thumb{width:100%;aspect-ratio:4/3;background:#0a0a0a;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.img-card .thumb img{width:100%;height:100%;object-fit:contain}
.img-card .thumb .placeholder{color:var(--muted);font-size:11px;text-align:center;padding:16px}
.img-card .thumb .override-badge{position:absolute;top:8px;right:8px;background:var(--green);color:#fff;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:4px}
.img-card .info{padding:12px 14px}
.img-card .info .name{font-size:12px;font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.img-card .info .dims{font-size:10px;color:var(--muted)}
.img-card .info .dims span{color:var(--accent);font-weight:600}
.img-card .actions{display:flex;gap:8px;padding:0 14px 12px}
.img-card .actions button{flex:1;padding:8px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;border:none;border-radius:6px;cursor:pointer;font-family:inherit;transition:all .2s}
.img-card .actions .btn-replace{background:var(--accent-dim);color:var(--accent)}
.img-card .actions .btn-replace:hover{background:rgba(196,168,124,.25)}
.img-card .actions .btn-reset{background:rgba(255,255,255,.06);color:var(--muted);display:none}
.img-card .actions .btn-reset:hover{color:var(--red)}
.img-card.has-override .actions .btn-reset{display:block}

/* Upload Modal */
#upload-modal{position:fixed;inset:0;z-index:1000;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.7);backdrop-filter:blur(8px)}
#upload-modal.active{display:flex}
.modal-inner{background:var(--card);border:1px solid var(--border);border-radius:14px;width:560px;max-width:92vw;max-height:90vh;overflow:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border)}
.modal-header h3{font-size:16px;font-weight:700}
.modal-close{background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;padding:4px 8px}
.modal-close:hover{color:#fff}
.modal-body{padding:24px}
.drop-zone{border:2px dashed rgba(196,168,124,.3);border-radius:10px;padding:48px 24px;text-align:center;cursor:pointer;transition:all .25s}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--accent);background:var(--accent-dim)}
.drop-zone .dz-icon{font-size:40px;margin-bottom:12px;opacity:.5}
.drop-zone .dz-text{font-size:13px;color:var(--muted);margin-bottom:4px}
.drop-zone .dz-dims{font-size:11px;color:rgba(255,255,255,.3)}
.preview{margin-top:20px;text-align:center;display:none}
.preview img{max-width:100%;max-height:300px;border:1px solid var(--border);border-radius:8px}
.preview-info{margin-top:12px;font-size:11px;color:var(--muted)}
.preview-warn{color:var(--accent);font-weight:600}
.preview-ok{color:var(--green);font-weight:600}
.modal-actions{display:flex;gap:12px;margin-top:20px;justify-content:flex-end}
.modal-actions button{padding:12px 28px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border:none;border-radius:8px;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-cancel{background:rgba(255,255,255,.06);color:var(--muted)}
.btn-cancel:hover{color:#fff}
.btn-save{background:var(--accent);color:#111}
.btn-save:hover{opacity:.85}
.btn-save:disabled{opacity:.3;cursor:default}

/* Toast */
#toast-wrap{position:fixed;bottom:24px;right:24px;z-index:2000;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{padding:12px 20px;font-size:13px;font-weight:500;color:#fff;background:rgba(26,23,21,.95);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:8px;transform:translateX(120%);transition:transform .3s;pointer-events:auto}
.toast.show{transform:translateX(0)}
.toast.success{border-left:3px solid var(--green)}
.toast.error{border-left:3px solid var(--red)}

/* Saving overlay */
.saving-overlay{position:absolute;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;border-radius:12px;z-index:5;display:none}
.saving-overlay.active{display:flex}
.saving-overlay .spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Responsive */
@media(max-width:768px){
  .tabs,.grid-wrap{padding-left:16px;padding-right:16px}
  .topbar{padding:12px 16px}
  .grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
}
</style>
</head>

<div id="toast-wrap"></div>

    },
    "Blog (članek)": {
      page_id: "/blog-details",
      sections: {
        "Blog članek": [
          { id: "blog-detail-thumb", label: "Naslovna slika", dims: "595x440" },
          { id: "blog-detail-thumb2", label: "Slika v članku 1", dims: "1200x800" },
          { id: "blog-detail-thumb3", label: "Slika v članku 2", dims: "1200x960" },
        ]
      }
    },
  };

  // ──────────────────────────────────────────────
  // STATE
  // ──────────────────────────────────────────────
  var overridesByPage = {};  // { pageId: { elementId: { image_url, ... } } }
  var currentUpload = null;  // { pageId, elementId, dims, label }
  var currentFile = null;
  var activeTab = null;

  // ──────────────────────────────────────────────
  // AUTH
  // ──────────────────────────────────────────────
  function login(token) {
    return fetch("/api/verify-editor", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token: token }),
    }).then(function(r){ return r.json(); });
  }

  // ──────────────────────────────────────────────
  // API
  // ──────────────────────────────────────────────
  function loadOverrides(pageId) {
    return fetch(API + "?page=" + encodeURIComponent(pageId))
      .then(function(r){ return r.ok ? r.json() : { overrides: {} }; })
      .then(function(d){ return d.overrides || {}; });
  }

  function saveImage(pageId, elementId, base64, contentType, fileName) {
    return fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json", Authorization: "Bearer " + TOKEN },
      body: JSON.stringify({
        action: "save_image",
        page_id: pageId,
        element_id: elementId,
        image_data: base64,
        image_type: contentType,
        image_name: fileName,
      }),
    }).then(function(r){ return r.json(); });
  }

  function deleteOverride(pageId, elementId) {
    return fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json", Authorization: "Bearer " + TOKEN },
      body: JSON.stringify({
        action: "delete",
        page_id: pageId,
        element_id: elementId,
      }),
    }).then(function(r){ return r.json(); });
  }

  // ──────────────────────────────────────────────
  // TOAST
  // ──────────────────────────────────────────────
  function toast(msg, type) {
    var wrap = document.getElementById("toast-wrap");
    var t = document.createElement("div");
    t.className = "toast " + (type || "");
    t.textContent = msg;
    wrap.appendChild(t);
    requestAnimationFrame(function(){ t.classList.add("show"); });
    setTimeout(function(){
      t.classList.remove("show");
      setTimeout(function(){ t.remove(); }, 300);
    }, 3000);
  }

  // ──────────────────────────────────────────────
  // RENDER
  // ──────────────────────────────────────────────
  function renderTabs() {
    var tabsEl = document.getElementById("tabs");
    tabsEl.innerHTML = "";
    var pages = Object.keys(IMAGE_REGISTRY);
    pages.forEach(function(pageName, i) {
      var btn = document.createElement("button");
      btn.className = "tab" + (i === 0 ? " active" : "");
      btn.textContent = pageName;
      btn.onclick = function() {
        document.querySelectorAll(".tab").forEach(function(t){ t.classList.remove("active"); });
        btn.classList.add("active");
        activeTab = pageName;
        renderGrid(pageName);
      };
      tabsEl.appendChild(btn);
    });
    activeTab = pages[0];
    renderGrid(pages[0]);
  }

  function renderGrid(pageName) {
    var wrap = document.getElementById("gridWrap");
    wrap.innerHTML = "";
    var pageData = IMAGE_REGISTRY[pageName];
    var pageId = pageData.page_id;
    var pageOverrides = overridesByPage[pageId] || {};

    Object.keys(pageData.sections).forEach(function(sectionName) {
      var items = pageData.sections[sectionName];

      var label = document.createElement("div");
      label.className = "section-label";
      label.textContent = sectionName + " (" + items.length + ")";
      wrap.appendChild(label);

      var grid = document.createElement("div");
      grid.className = "grid";

      items.forEach(function(item) {
        var override = pageOverrides[item.id];
        var hasOverride = override && override.image_url;

        var card = document.createElement("div");
        card.className = "img-card" + (hasOverride ? " has-override" : "");
        card.id = "card-" + item.id;

        var thumb = document.createElement("div");
        thumb.className = "thumb";

        // Show override image, or original image, or placeholder
        var showSrc = hasOverride ? override.image_url : (item.src || null);
        if (showSrc) {
          var img = document.createElement("img");
          img.src = showSrc + (showSrc.indexOf("?") === -1 ? V : "");
          img.alt = item.label;
          img.loading = "lazy";
          thumb.appendChild(img);
          if (hasOverride) {
            var badge = document.createElement("div");
            badge.className = "override-badge";
            badge.textContent = "Prilagojeno";
            thumb.appendChild(badge);
          }
        } else {
          var ph = document.createElement("div");
          ph.className = "placeholder";
          ph.textContent = "Originalna slika\n(ni predogleda)";
          thumb.appendChild(ph);
        }

        var info = document.createElement("div");
        info.className = "info";
        info.innerHTML = '<div class="name">' + escHtml(item.label) + '</div>'
          + '<div class="dims">Dimenzije: <span>' + item.dims + ' px</span></div>';

        var actions = document.createElement("div");
        actions.className = "actions";

        var replaceBtn = document.createElement("button");
        replaceBtn.className = "btn-replace";
        replaceBtn.textContent = "Zamenjaj";
        replaceBtn.onclick = function(e) {
          e.stopPropagation();
          openModal(pageData.page_id, item);
        };

        var resetBtn = document.createElement("button");
        resetBtn.className = "btn-reset";
        resetBtn.textContent = "Ponastavi";
        resetBtn.onclick = function(e) {
          e.stopPropagation();
          if (!confirm("Ponastavite sliko na original?")) return;
          resetBtn.disabled = true;
          deleteOverride(pageData.page_id, item.id).then(function() {
            delete pageOverrides[item.id];
            renderGrid(activeTab);
            toast("Slika ponastavljena", "success");
          }).catch(function() {
            toast("Napaka pri ponastavitvi", "error");
            resetBtn.disabled = false;
          });
        };

        actions.appendChild(replaceBtn);
        actions.appendChild(resetBtn);

        card.appendChild(thumb);
        card.appendChild(info);
        card.appendChild(actions);
        grid.appendChild(card);
      });

      wrap.appendChild(grid);
    });
  }

  function escHtml(s) {
    var d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
  }

  // ──────────────────────────────────────────────
  // UPLOAD MODAL
  // ──────────────────────────────────────────────
  function openModal(pageId, item) {
    currentUpload = { pageId: pageId, id: item.id, dims: item.dims, label: item.label };
    currentFile = null;
    document.getElementById("modalTitle").textContent = "Zamenjaj: " + item.label;
    document.getElementById("dzDims").textContent = "Priporočene dimenzije: " + item.dims + " px";
    document.getElementById("preview").style.display = "none";
    document.getElementById("modalSave").disabled = true;
    document.getElementById("fileInput").value = "";
    document.getElementById("upload-modal").classList.add("active");
  }

  function closeModal() {
    document.getElementById("upload-modal").classList.remove("active");
    currentUpload = null;
    currentFile = null;
  }

  function handleFile(file) {
    if (!file || !file.type.startsWith("image/")) { toast("Izberite slikovno datoteko", "error"); return; }
    if (file.size > 10 * 1024 * 1024) { toast("Slika je prevelika (max 10 MB)", "error"); return; }
    currentFile = file;

    var reader = new FileReader();
    reader.onload = function(e) {
      var img = new Image();
      img.onload = function() {
        document.getElementById("previewImg").src = e.target.result;
        document.getElementById("preview").style.display = "";

        var info = img.naturalWidth + " × " + img.naturalHeight + " px";
        var sizeKB = Math.round(file.size / 1024);
        info += " | " + (sizeKB > 1024 ? (sizeKB / 1024).toFixed(1) + " MB" : sizeKB + " KB");

        if (currentUpload.dims) {
          var parts = currentUpload.dims.split("x").map(Number);
          var reqW = parts[0], reqH = parts[1];
          if (reqW && reqH) {
            var ratioDiff = Math.abs((reqW / reqH) - (img.naturalWidth / img.naturalHeight));
            if (ratioDiff > 0.15) {
              info += '<br><span class="preview-warn">⚠ Razmerje stranic se ne ujema (' + reqW + '×' + reqH + ')</span>';
            } else if (img.naturalWidth < reqW * 0.5) {
              info += '<br><span class="preview-warn">⚠ Slika je premajhna (min. ' + reqW + 'px širine)</span>';
            } else {
              info += '<br><span class="preview-ok">✓ Dimenzije ustrezajo</span>';
            }
          }
        }
        document.getElementById("previewInfo").innerHTML = info;
        document.getElementById("modalSave").disabled = false;
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  function uploadAndSave() {
    if (!currentUpload || !currentFile) return;
    var saveBtn = document.getElementById("modalSave");
    saveBtn.disabled = true;
    saveBtn.textContent = "Nalagam...";

    var reader = new FileReader();
    reader.onload = function(e) {
      var base64 = e.target.result.split(",")[1];
      saveImage(currentUpload.pageId, currentUpload.id, base64, currentFile.type, currentFile.name)
        .then(function(data) {
          if (data.success && data.image_url) {
            if (!overridesByPage[currentUpload.pageId]) overridesByPage[currentUpload.pageId] = {};
            overridesByPage[currentUpload.pageId][currentUpload.id] = {
              type: "image",
              image_url: data.image_url,
            };
            renderGrid(activeTab);
            toast("Slika uspešno zamenjana!", "success");
          } else {
            toast("Napaka: " + (data.error || "Neznana napaka"), "error");
          }
          closeModal();
          saveBtn.textContent = "Naloži in zamenjaj";
        })
        .catch(function(err) {
          toast("Napaka: " + err.message, "error");
          saveBtn.disabled = false;
          saveBtn.textContent = "Naloži in zamenjaj";
        });
    };
    reader.readAsDataURL(currentFile);
  }

  // ──────────────────────────────────────────────
  // INIT
  // ──────────────────────────────────────────────
  function initApp() {
    // Render tabs immediately so UI is never blank
    renderTabs();

    // Then load overrides in the background and re-render
    var pages = Object.keys(IMAGE_REGISTRY);
    var promises = pages.map(function(pageName) {
      var pageId = IMAGE_REGISTRY[pageName].page_id;
      return loadOverrides(pageId).then(function(overrides) {
        overridesByPage[pageId] = overrides;
      }).catch(function() { /* ignore per-page errors */ });
    });

    Promise.all(promises).then(function() {
      if (activeTab) renderGrid(activeTab);
    }).catch(function() {});
  }

  // Event bindings
  document.getElementById("loginBtn").addEventListener("click", function() {
    var token = document.getElementById("tokenInput").value.trim();
    if (!token) return;
    login(token).then(function(data) {
      if (data.valid) {
        TOKEN = token;
        sessionStorage.setItem("ts-editor-token", token);
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("app").style.display = "block";
        initApp();
      } else {
        document.getElementById("loginError").style.display = "";
      }
    }).catch(function() {
      document.getElementById("loginError").style.display = "";
    });
  });

  document.getElementById("tokenInput").addEventListener("keydown", function(e) {
    if (e.key === "Enter") document.getElementById("loginBtn").click();
    document.getElementById("loginError").style.display = "none";
  });

  document.getElementById("logoutBtn").addEventListener("click", function() {
    sessionStorage.removeItem("ts-editor-token");
    location.reload();
  });

  // Modal events
  var dropZone = document.getElementById("dropZone");
  var fileInput = document.getElementById("fileInput");
  dropZone.addEventListener("click", function() { fileInput.click(); });
  fileInput.addEventListener("change", function() { if (fileInput.files[0]) handleFile(fileInput.files[0]); });
  dropZone.addEventListener("dragover", function(e) { e.preventDefault(); dropZone.classList.add("dragover"); });
  dropZone.addEventListener("dragleave", function() { dropZone.classList.remove("dragover"); });
  dropZone.addEventListener("drop", function(e) { e.preventDefault(); dropZone.classList.remove("dragover"); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
  document.getElementById("modalClose").addEventListener("click", closeModal);
  document.getElementById("modalCancel").addEventListener("click", closeModal);
  document.getElementById("modalSave").addEventListener("click", uploadAndSave);
  document.getElementById("upload-modal").addEventListener("click", function(e) { if (e.target === this) closeModal(); });
  document.addEventListener("keydown", function(e) { if (e.key === "Escape") closeModal(); });

  // Auto-login if token in session
  var savedToken = sessionStorage.getItem("ts-editor-token");
  if (savedToken) {
    login(savedToken).then(function(data) {
      if (data.valid) {
        TOKEN = savedToken;
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("app").style.display = "block";
        initApp();
      }
    });
  }
})();
</script>
</body>
